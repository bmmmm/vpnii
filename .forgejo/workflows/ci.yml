name: CI

# Mirror-gate: must pass before pushes are considered safe to mirror to
# GitHub. Forgejo Actions on the runner-host runner — `runs-on: docker` matches
# its registered label `docker:docker://data.forgejo.org/oci/node:20-bullseye`,
# so jobs execute in that node image (debian bullseye, runs as root,
# no sudo needed). The test suite has no macOS dependency since every
# system binary is stubbed (route, networksetup, dig, ifconfig, sudo,
# wg-quick, tailscale).

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: docker
    steps:
      - uses: actions/checkout@v4

      - name: Install zsh
        run: |
          apt-get update -qq
          apt-get install -qq -y zsh

      - name: Run test suite
        run: tests/run.zsh

  shellcheck:
    runs-on: docker
    steps:
      - uses: actions/checkout@v4

      - name: Install shellcheck
        run: |
          apt-get update -qq
          apt-get install -qq -y shellcheck

      # install.sh / uninstall.sh are zsh, not POSIX/bash — shellcheck
      # would refuse them. Only scripts/*.sh ship with a #!/bin/bash
      # shebang, so that's where we lint.
      - name: Lint bash scripts
        run: shellcheck scripts/*.sh

  todo-lint:
    runs-on: docker
    steps:
      - uses: actions/checkout@v4

      # Refuse merges that leave TODO/FIXME/XXX markers in code. The
      # explicit char-class boundaries are portable across BSD and GNU
      # grep (avoiding `\b`, which BSD grep doesn't support, and
      # `[[:<:]]`, which GNU grep doesn't support). Test fixtures with
      # literal `XXXXYYYY` base64-shaped strings don't trip it because
      # they're surrounded by word chars on at least one side.
      - name: Refuse TODO/FIXME/XXX markers
        run: |
          set -e
          if grep -rEn '(^|[^A-Za-z0-9_])(TODO|FIXME|XXX)([^A-Za-z0-9_]|$)' \
            bin/ lib/ scripts/ install.sh uninstall.sh tests/*.zsh; then
            echo "::error::Unfinished work markers above — finish or remove before merging."
            exit 1
          fi
          echo "Clean — no TODO/FIXME/XXX markers in code."
